packages:
  "framer-motion": "For page transitions and smooth micro-interactions"
  "recharts": "For the circular success score gauge and admin charts"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod validation integration"
  "zod": "For schema validation"
  "date-fns": "For human-readable date formatting"
