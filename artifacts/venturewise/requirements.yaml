  - path: "artifacts/venturewise/public/images/startup-abstract.png"
    description: "Minimalist 3D rendered abstract geometric shapes in dark blue and metallic gold representing business growth and structural foundation"
    aspect_ratio: "16:9"
  - path: "artifacts/venturewise/public/images/logo-mark.png"
